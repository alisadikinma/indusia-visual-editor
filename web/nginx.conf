# SPA nginx server block. Vite emits hashed asset filenames so we cache them
# aggressively; index.html stays no-cache because every deploy rewrites it.
# Unknown routes fall through to index.html so the Vue router handles them.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets are content-addressed; cache forever.
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|webp|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Lightweight health probe consumed by Traefik / docker compose healthcheck.
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
