# Traefik v3 static configuration. Mounted read-only at /etc/traefik/traefik.yml
# inside the traefik container (see docker-compose.prod.yml). Dynamic routing
# rules live in dynamic.yml — change those without restarting Traefik.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: INFO
  format: json

accessLog:
  format: json

api:
  dashboard: true
  insecure: false  # dashboard reached via a tls-protected router only

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: ive-edge
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # IMPORTANT: replace at deploy time via env or commit per-environment files
      email: ops@indusia.example
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web
