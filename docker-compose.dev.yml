# Dev environment for indusia-visual-editor.
# Postgres for the API; the api + web services are optional — most devs run
# them locally (`poetry run uvicorn ...` + `pnpm dev`) against the dockerized
# Postgres. Bring the api/web profiles in only for integration-style checks.

services:
  postgres:
    image: postgres:16-alpine
    container_name: ive-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ive
      POSTGRES_PASSWORD: ive
      POSTGRES_DB: ive
    # Use host port 5433 to avoid clashing with any native Postgres install
    # that already squats on 5432 (common on Windows dev machines).
    ports:
      - "5433:5432"
    volumes:
      - ive-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ive -d ive"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ive-api-dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IVE_DATABASE_URL: postgresql+asyncpg://ive:ive@postgres:5432/ive
      IVE_APP_HOST: 0.0.0.0
      IVE_APP_PORT: 8002
      IVE_LOG_LEVEL: INFO
    ports:
      - "8002:8002"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./pyproject.toml:/app/pyproject.toml
      - ./poetry.lock:/app/poetry.lock

  web:
    profiles: ["full"]
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ive-web-dev
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8002
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts

volumes:
  ive-postgres-data:
    name: ive-postgres-data
